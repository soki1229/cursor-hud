name: Build & Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyinstaller pyqt5 requests

      - name: Build EXE
        run: python -m PyInstaller --onefile --windowed --name CursorHUD cursor_hud.py

      # Extract release notes from CHANGELOG for this tag (e.g. ## v1.0.0-beta.1 ... until next ## or EOF)
      - name: Prepare release notes
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          awk -v tag="$TAG" '
            $0 ~ "## " tag { found=1; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md > release_notes.md

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          files: dist/CursorHUD.exe