name: Pull Request Build

on:
  pull_request:
    branches:
      - master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    name: Lint, Format & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install ruff pytest requests pyqt5

      - name: Check formatting (Ruff)
        run: ruff format --check .

      - name: Linting (Ruff)
        run: ruff check .

      - name: Run tests (Pytest)
        run: pytest tests/

  build-windows:
    name: Build Windows
    needs: [validate]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyinstaller pyqt5 requests

      - name: Build EXE
        run: python -m PyInstaller --onefile --windowed --name CursorHUD --icon=assets/icon.ico --add-data "assets/icon.ico;assets" --add-data "assets/fonts;assets/fonts" cursor_hud.py

      - uses: actions/upload-artifact@v4
        with:
          name: windows-pr-build
          path: dist/CursorHUD.exe

  build-macos:
    name: Build macOS
    needs: [validate]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyinstaller pyqt5 requests

      - name: Build .app
        run: python -m PyInstaller --windowed --name CursorHUD --icon=assets/icon.icns --add-data "assets/fonts:assets/fonts" cursor_hud.py

      - name: Strip unused Qt frameworks
        run: |
          QT5_LIB="dist/CursorHUD.app/Contents/Frameworks/PyQt5/Qt5/lib"
          rm -rf "${QT5_LIB}/QtQuick.framework"
          rm -rf "${QT5_LIB}/QtQml.framework"
          rm -rf "${QT5_LIB}/QtQmlModels.framework"
          rm -rf "${QT5_LIB}/QtNetwork.framework"
          rm -rf "${QT5_LIB}/QtWebSockets.framework"

      - name: Zip .app bundle
        run: zip -r CursorHUD-macOS.zip dist/CursorHUD.app

      - uses: actions/upload-artifact@v4
        with:
          name: macos-pr-build
          path: CursorHUD-macOS.zip

  build-linux:
    name: Build Linux
    needs: [validate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libxcb-xinerama0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-xkb1 libxkbcommon-x11-0 \
            libgl1
          pip install pyinstaller pyqt5 requests

      - name: Build binary
        run: python -m PyInstaller --onefile --windowed --name CursorHUD --icon=assets/icon_256.png --add-data "assets/fonts:assets/fonts" cursor_hud.py

      - name: Rename binary
        run: mv dist/CursorHUD dist/CursorHUD-Linux

      - uses: actions/upload-artifact@v4
        with:
          name: linux-pr-build
          path: dist/CursorHUD-Linux
